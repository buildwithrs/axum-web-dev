<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>WebSocket Demo</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 { margin-bottom: 0.25rem; }
        .status {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #ddd;
            color: #333;
        }
        .status.connected { background: #2ecc71; color: #fff; }
        .status.disconnected { background: #e74c3c; color: #fff; }
        .status.connecting { background: #f39c12; color: #fff; }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.5rem;
            font-size: 1rem;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
        }
        button:disabled { cursor: not-allowed; opacity: 0.5; }

        #log {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0.75rem;
            height: 320px;
            overflow-y: auto;
            background: #fafafa;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.9rem;
        }
        @media (prefers-color-scheme: dark) {
            #log { background: #1e1e1e; border-color: #444; }
        }
        .log-entry { margin: 0.15rem 0; word-wrap: break-word; }
        .log-entry .ts { color: #888; margin-right: 0.5rem; }
        .log-entry .tag { font-weight: 600; margin-right: 0.5rem; }
        .log-entry .tag.you { color: #2980b9; }
        .log-entry .tag.server { color: #27ae60; }
        .log-entry .tag.system { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>
    <h1>WebSocket Demo</h1>
    <p>
        <span id="status" class="status disconnected">Disconnected</span>
        &nbsp;ws://127.0.0.1:8080/ws
    </p>

    <div class="controls">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
    </div>

    <div class="controls">
        <input id="msgInput" type="text" placeholder="Type a message and press Enter" disabled />
        <button id="sendBtn" disabled>Send</button>
    </div>

    <div id="log"></div>

    <script>
        const WS_URL = "ws://127.0.0.1:8080/ws";
        const statusEl   = document.getElementById("status");
        const logEl      = document.getElementById("log");
        const msgInput   = document.getElementById("msgInput");
        const sendBtn    = document.getElementById("sendBtn");
        const connectBtn = document.getElementById("connectBtn");
        const disconnectBtn = document.getElementById("disconnectBtn");

        let socket = null;

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = "status " + cls;
        }

        function appendLog(tag, text, tagClass) {
            const entry = document.createElement("div");
            entry.className = "log-entry";

            const ts = document.createElement("span");
            ts.className = "ts";
            ts.textContent = new Date().toLocaleTimeString();

            const tagEl = document.createElement("span");
            tagEl.className = "tag " + (tagClass || "");
            tagEl.textContent = tag;

            const body = document.createElement("span");
            body.textContent = text;

            entry.append(ts, tagEl, body);
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setConnectedUI(connected) {
            msgInput.disabled  = !connected;
            sendBtn.disabled   = !connected;
            connectBtn.disabled    = connected;
            disconnectBtn.disabled = !connected;
        }

        function connect() {
            if (socket && socket.readyState <= WebSocket.OPEN) return;
            setStatus("Connecting...", "connecting");
            appendLog("system", `connecting to ${WS_URL}`, "system");

            socket = new WebSocket(WS_URL);

            socket.addEventListener("open", () => {
                setStatus("Connected", "connected");
                setConnectedUI(true);
                appendLog("system", "connection established", "system");
            });

            socket.addEventListener("message", (event) => {
                appendLog("server", event.data, "server");
            });

            socket.addEventListener("error", () => {
                appendLog("system", "websocket error", "system");
            });

            socket.addEventListener("close", (event) => {
                setStatus("Disconnected", "disconnected");
                setConnectedUI(false);
                appendLog(
                    "system",
                    `connection closed (code=${event.code}, reason=${event.reason || "none"})`,
                    "system"
                );
                socket = null;
            });
        }

        function disconnect() {
            if (socket) socket.close(1000, "client closing");
        }

        function sendMessage() {
            const text = msgInput.value;
            if (!text) return;
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                appendLog("system", "not connected", "system");
                return;
            }
            socket.send(text);
            appendLog("you", text, "you");
            msgInput.value = "";
        }

        connectBtn.addEventListener("click", connect);
        disconnectBtn.addEventListener("click", disconnect);
        sendBtn.addEventListener("click", sendMessage);
        msgInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Auto-connect on page load for convenience
        connect();
    </script>
</body>
</html>
